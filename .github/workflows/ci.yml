name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Lightweight workspace checks. The LLVM backend crate is excluded from the
  # workspace, so these jobs need no LLVM toolchain.
  #
  # Cost control on a PRIVATE repo (macOS = 10x billed minutes, Windows = 2x,
  # Linux = 1x):
  #   - pull_request : ubuntu-latest ONLY -> 1x  (fast, cheap iteration feedback)
  #   - push to main : full 3-OS matrix   -> 13x (cross-platform check, once,
  #                                               right before the change lands)
  # The conditional matrix uses fromJSON: on a PR it expands to one entry, on a
  # push to main it expands to all three.
  workspace:
    name: workspace (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "macos-latest", "windows-latest"]') }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  # Isolated LLVM job: builds and tests the native backend crate against a pinned
  # LLVM 18 toolchain. Kept separate so a toolchain problem never blocks the
  # lightweight workspace jobs.
  #
  # Gated so it neither burns minutes nor blocks every PR (the backend has a
  # known pre-existing Polly linker failure on the hosted runner):
  #   - runs on push to main (pre-merge validation)
  #   - on a PR, runs ONLY when the PR carries the `llvm-check` label
  # `continue-on-error` keeps the known-red result non-blocking even when it runs.
  llvm-backend:
    name: llvm-backend (LLVM 18)
    if: ${{ github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'llvm-check') }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install LLVM 18
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          echo "LLVM_SYS_180_PREFIX=$(llvm-config-18 --prefix)" >> "$GITHUB_ENV"
      - name: Test native backend
        run: cargo test --manifest-path crates/plc_llvm_backend/Cargo.toml

  # Isolated CPDev VM job: builds/tests the crate that vendors the CPDev C++ VM
  # (excluded from the workspace, so the lightweight jobs stay C++-free). The
  # vendored sources are POSIX-only (clock_gettime/unistd/usleep), so this runs on
  # Linux + macOS, never Windows. GitHub runners ship clang, so no install step.
  #   - pull_request : ubuntu-latest ONLY -> 1x  (cheap breakage check)
  #   - push to main : ubuntu + macos            (cross-platform, pre-merge)
  cpdev-vm:
    name: cpdev-vm (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "macos-latest", "windows-latest"]') }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --manifest-path crates/plc_cpdev_vm/Cargo.toml -- --check
      - name: Clippy
        run: cargo clippy --manifest-path crates/plc_cpdev_vm/Cargo.toml --all-targets -- -D warnings
      - name: Test
        # Single-threaded: the shim's StdoutSilencer swaps the process-wide
        # stdout fd around the vendored VM's progress prints, which races when
        # tests run on parallel threads (production runs one VM at a time).
        run: cargo test --manifest-path crates/plc_cpdev_vm/Cargo.toml -- --test-threads=1

  # VS Code extension client checks (ubuntu only, fast feedback on every run).
  vscode:
    name: vscode-client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci || npm install
      - name: Type-check
        run: npx tsc --noEmit
      - name: Test
        run: npm test
