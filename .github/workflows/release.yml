name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build the server + CLI for each target, bundle them into the extension's
  # server/ directory, and package one platform-specific VSIX per target.
  package:
    name: package ${{ matrix.vsce_target }}
    runs-on: ${{ matrix.os }}
    # Exposed as a job-level env so the publish step's `if:` can read it — the
    # `secrets` context is NOT allowed in `if:`, but `env` is.
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # `plc_features` enables the CPDev VM (`cpdev`) in the bundled `plc` so
          # `plc run <file>.xcp` works locally. The vendored VM is a POSIX/Linux
          # port (unistd.h / clock_gettime), so it is enabled only on macOS +
          # Linux; on Windows the CLI still compiles .xcp (pure Rust) but prints a
          # clear message for `run .xcp`.
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            vsce_target: darwin-arm64
            ext: ""
            plc_features: "--features cpdev"
          - os: macos-latest
            rust_target: x86_64-apple-darwin
            vsce_target: darwin-x64
            ext: ""
            plc_features: "--features cpdev"
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            vsce_target: linux-x64
            ext: ""
            plc_features: "--features cpdev"
          - os: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            vsce_target: linux-arm64
            ext: ""
            plc_features: "--features cpdev"
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            vsce_target: win32-x64
            ext: ".exe"
            plc_features: ""
          # Windows on ARM. Cross-compiled from the x64 windows-latest runner
          # (MSVC links ARM64 natively); best-effort — fail-fast: false keeps the
          # other platform VSIXs publishing if this leg ever fails.
          - os: windows-latest
            rust_target: aarch64-pc-windows-msvc
            vsce_target: win32-arm64
            ext: ".exe"
            plc_features: ""
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install aarch64 Linux cross toolchain
        if: matrix.vsce_target == 'linux-arm64'
        run: |
          sudo apt-get update
          # gcc = Rust linker; g++ = C++ cross-compiler the `cc` crate needs to
          # build the vendored CPDev VM for the `cpdev` feature.
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          {
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc"
            echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc"
            echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++"
          } >> "$GITHUB_ENV"

      - name: Build server and CLI (release)
        run: |
          cargo build --release --target ${{ matrix.rust_target }} --package plc_lsp_server --bin plc-lsp-server
          cargo build --release --target ${{ matrix.rust_target }} --package plc_cli --bin plc ${{ matrix.plc_features }}

      - name: Bundle binaries into the extension
        shell: bash
        run: |
          mkdir -p editors/vscode/server
          cp "target/${{ matrix.rust_target }}/release/plc-lsp-server${{ matrix.ext }}" editors/vscode/server/
          cp "target/${{ matrix.rust_target }}/release/plc${{ matrix.ext }}" editors/vscode/server/

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install extension dependencies
        working-directory: editors/vscode
        run: npm ci || npm install

      - name: Type-check and contract test
        working-directory: editors/vscode
        run: npm test

      - name: Package platform VSIX
        working-directory: editors/vscode
        run: npx vsce package --no-dependencies --target ${{ matrix.vsce_target }} -o "plc-vscode-${{ matrix.vsce_target }}.vsix"

      - name: Verify bundled binaries in the VSIX
        working-directory: editors/vscode
        run: node scripts/verify-vsix.js "plc-vscode-${{ matrix.vsce_target }}.vsix" --target ${{ matrix.vsce_target }}

      - name: Upload VSIX to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: editors/vscode/plc-vscode-${{ matrix.vsce_target }}.vsix

      # Publishing requires a VSCE_PAT secret; skipped automatically otherwise.
      # Gated on the job-level `env.VSCE_PAT` (the `secrets` context is invalid
      # inside `if:`).
      - name: Publish platform VSIX to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        working-directory: editors/vscode
        run: npx vsce publish --no-dependencies --target ${{ matrix.vsce_target }} --packagePath "plc-vscode-${{ matrix.vsce_target }}.vsix" --pat "$VSCE_PAT"
